<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الكشك - النسخة الكاملة أونلاين</title>
<style>
:root { --primary: #1a73e8; --success: #27ae60; --danger: #d63031; --warning: #f1c40f; --bg: #f8f9fa; }
body { font-family: 'Segoe UI', Tahoma; background-color: var(--bg); margin: 0; padding: 10px; }
.container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
.tabs { display: flex; background: #eee; border-radius: 10px; padding: 5px; margin-bottom: 20px; }
.tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; }
.tab.active { background: white; color: var(--primary); }
.content { display: none; }
.content.active { display: block; }
input, select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border:1px solid #ddd }
.btn { padding: 10px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
</style>
</head>
<body><!-- LOGIN --><div id="login-screen" style="display:flex;align-items:center;justify-content:center;height:100vh;">
  <div style="background:white;padding:20px;border-radius:10px;width:300px;text-align:center;">
    <h3>🔐 دخول النظام</h3>
    <input type="password" id="pass" placeholder="كلمة السر">
    <button onclick="login()" class="btn">دخول</button>
    <p id="err" style="color:red"></p>
  </div>
</div><div id="app" style="display:none;">
<div class="container"><div class="tabs">
<div class="tab active" onclick="showTab('home')">🏠 السجلات</div>
<div class="tab" onclick="showTab('add')">➕ إضافة</div>
<div class="tab" onclick="showTab('expenses')">💸 المصروفات</div>
<div class="tab" onclick="showTab('report')">📈 التقارير</div>
</div><div id="home" class="content active">
<input id="search" placeholder="بحث..." oninput="draw()">
<table>
<thead><tr><th>العميل</th><th>المبلغ</th><th>الحالة</th><th>إجراء</th></tr></thead>
<tbody id="table-body"></tbody>
</table>
</div><div id="add" class="content">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="الهاتف">
<input id="amt" type="number" placeholder="المبلغ">
<select id="status">
<option value="done">خالص</option>
<option value="debt">دين</option>
</select>
<button class="btn" onclick="saveOp()">حفظ العملية</button>
</div><div id="expenses" class="content">
<input id="exp-note" placeholder="بيان">
<input id="exp-amt" type="number" placeholder="المبلغ">
<button class="btn" onclick="saveExp()">إضافة مصروف</button>
<ul id="expense-body"></ul>
</div><div id="report" class="content">
<h3>إجمالي الربح</h3>
<div id="grand-net">0</div>
</div></div>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDt86JtDZOXW1ojYrBVCWZm6yd5yFI0gY8",
  authDomain: "mmcash-bd27b.firebaseapp.com",
  projectId: "mmcash-bd27b",
  storageBucket: "mmcash-bd27b.appspot.com",
  messagingSenderId: "887509044320",
  appId: "1:887509044320:web:edefedce5c1fe047510705"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

enableIndexedDbPersistence(db).catch(()=>{});

let dbLocal = { ops: [], exps: [] };

onSnapshot(collection(db, "operations"), snap=>{
 dbLocal.ops=[];
 snap.forEach(d=>dbLocal.ops.push({id:d.id,...d.data()}));
 draw(); updateReport();
});

onSnapshot(collection(db, "expenses"), snap=>{
 dbLocal.exps=[];
 snap.forEach(d=>dbLocal.exps.push({id:d.id,...d.data()}));
 draw(); updateReport();
});

window.saveOp = async ()=>{
 await addDoc(collection(db,"operations"),{
  name:name.value,
  phone:phone.value,
  amt:+amt.value,
  status:status.value,
  date:new Date().toISOString().split('T')[0]
 });
 name.value=""; phone.value=""; amt.value="";
}

window.saveExp = async ()=>{
 await addDoc(collection(db,"expenses"),{
  note:exp-note.value,
  amt:+exp-amt.value,
  date:new Date().toISOString().split('T')[0]
 });
 exp-note.value=""; exp-amt.value="";
}

window.delOp = async id=> await deleteDoc(doc(db,"operations",id));
window.markAsDone = async id=> await updateDoc(doc(db,"operations",id),{status:'done'});

function draw(){
 let q=search.value.toLowerCase();
 let h="";
 dbLocal.ops.filter(x=>x.name.toLowerCase().includes(q)).forEach(x=>{
  h+=`<tr>
  <td>${x.name}</td>
  <td>${x.amt}</td>
  <td>${x.status}</td>
  <td>
   ${x.status==='debt'?`<button onclick="markAsDone('${x.id}')">✔</button>`:''}
   <button onclick="delOp('${x.id}')">🗑</button>
  </td>
  </tr>`;
 });
 table-body.innerHTML=h;

 let eh="";
 dbLocal.exps.forEach(e=>eh+=`<li>${e.note} - ${e.amt}</li>`);
 expense-body.innerHTML=eh;
}

function updateReport(){
 let p=dbLocal.ops.reduce((a,b)=>a+(b.status==='done'?b.amt:0),0);
 let e=dbLocal.exps.reduce((a,b)=>a+b.amt,0);
 grand-net.innerText=p-e;
}

window.showTab=t=>{
 document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
 document.getElementById(t).classList.add('active');
}
<script>
    // 1. إعدادات قاعدة البيانات (Firebase)
    const firebaseConfig = {
        apiKey: "AIzaSyDt86JtDZOXW1ojYrBVCWZm...", 
        authDomain: "mmcash-bd27b.firebaseapp.com",
        databaseURL: "https://mmcash-bd27b-default-rtdb.firebaseio.com",
        projectId: "mmcash-bd27b",
        appId: "1:887509044320:web:edefedce50..."
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database();

    // 2. دالة الدخول بالباسورد (2222)
    function login() {
        const pass = document.getElementById('pass').value;
        if (pass === "2222") { 
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            initSync(); // بدء جلب البيانات فور الدخول
        } else {
            document.getElementById('err').innerText = "كلمة السر خطأ!";
        }
    }

    // 3. المزامنة اللحظية مع السحاب
    function initSync() {
        dbRef.ref('data').on('value', (snapshot) => {
            if (snapshot.val()) {
                db = snapshot.val();
                draw(); // تحديث الجدول
                if(typeof updateReport === 'function') updateReport(); // تحديث التقارير
            }
        });
    }

    // 4. دالة الحفظ الموحدة (للسحاب وللمتصفح)
    function save() {
        dbRef.ref('data').set(db);
        localStorage.setItem('kiosk_vfinal', JSON.stringify(db));
    }

    // 5. مراقبة حالة الاتصال بالإنترنت
    window.addEventListener('offline', () => alert('أنت الآن غير متصل بالإنترنت - سيتم الحفظ محلياً'));
    window.addEventListener('online', () => {
        alert('تم استعادة الاتصال - جاري المزامنة مع السحاب');
        save();
    });
</script>
</script></body>
</html>
